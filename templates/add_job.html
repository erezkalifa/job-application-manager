{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2>Add New Job Application</h2>
    </div>
    <div class="col text-end">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to List
        </a>
    </div>
</div>

<form id="jobForm" method="POST" enctype="multipart/form-data">
    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">
                    <h4>Job Details</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="company" class="form-label">Company Name</label>
                        <input type="text" class="form-control" id="company" name="company" required>
                    </div>
                    <div class="mb-3">
                        <label for="position" class="form-label">Position</label>
                        <input type="text" class="form-control" id="position" name="position" required>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">Initial Status</label>
                        <select name="status" id="status" class="form-select" required>
                            {% for status in ApplicationStatus %}
                            <option value="{{ status.name }}" {% if status.name == 'DRAFT' %}selected{% endif %}>
                                {{ status.value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Job Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">
                    <h4>Resume Upload</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="resume" class="form-label">Resume File</label>
                        <input type="file" class="form-control" id="resume" name="resume">
                    </div>
                    <div class="mb-3">
                        <label for="resume_notes" class="form-label">Resume Notes</label>
                        <textarea class="form-control" id="resume_notes" name="resume_notes" rows="2"></textarea>
                    </div>
                    <div class="text-end mt-4">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create Job Application</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}
